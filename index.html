<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>かじあかねチャレンジ</title>

<style>
body{
  margin:0;
  background:linear-gradient(#ffdff2,#e6f7ff);
  color:#ff4f9a;
  font-family:sans-serif;
  overflow:hidden;
  max-width:430px;
  margin:0 auto;
  height:100vh;
}

#start,#win{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(#ffdff2,#e6f7ff);
}

#game{
  display:none;
}

button{
  font-size:22px;
  padding:11px 14px;
  border-radius:12px;
  border:none;
  position:absolute;
  background:#fff7b8;
  border:3px solid #ff9ecf;
  box-shadow:0 4px 12px rgba(255,158,207,.5);
  z-index:2;
}

#progress{
  position:fixed;
  top:10px;
  left:10px;
  font-size:24px;
  z-index:10;
}

#msg{
  position:fixed;
  top:48px;
  left:10px;
  font-size:16px;
  z-index:10;
}

h1{
  font-size:40px;
  text-align:center;
}

@keyframes pop{
  50%{
    transform:scale(1.08);
  }
}

/* 透明な120%タップ判定 */
.hit-area{
  position:absolute;
  width:120%;
  height:120%;
  left:-10%;
  top:-10%;
  z-index:1;
  cursor:pointer;
}

/* スマホ向け調整 */
@media(max-width:600px){
  #start h1{
    font-size:32px;
  }

  #start button{
    font-size:20px;
    padding:10px 13px;
  }
}
</style>

</head>

<body>

<div id="start">
  <h1>かじあかねチャレンジ</h1>
  <button style="position:static" onclick="startGame()">🚀 GAME START</button>
</div>

<div id="game">
  <div id="progress"></div>
  <div id="msg">順番:か→じ→あ→か→ね</div>
</div>

<div id="win" style="display:none;background:linear-gradient(45deg,#ffd1ec,#d8f3ff)">
  <h1 style="font-size:42px;animation:pop .8s infinite">
    🎉🎀 CONGRATULATIONS 🎀🎉
  </h1>

  <h1 style="font-size:40px;color:#ff4fa3">
    🌸 かじあかね さん 🌸
  </h1>

  <h1 id="time" style="font-size:36px;color:#ff9800;text-shadow:0 0 12px #fff"></h1>

  <h2 style="font-size:32px">
    💖 AMAZING!! 💖
  </h2>
</div>

<script>
const seq=["か","じ","あ","か","ね"];

const vars={
  "か":["か","カ","Ka","KA","火"],
  "じ":["じ","ジ","Ji","JI","字"],
  "あ":["あ","ア","A","亜"],
  "ね":["ね","ネ","NE","音"]
};

let idx=0;
let start;
let bts=[];

function alias(c){
  let a=vars[c]||[c];
  return a[Math.floor(Math.random()*a.length)];
}

function mk(ch){

  // 見た目のボタン
  let b=document.createElement("button");

  b.dataset.k=ch;
  b.textContent=alias(ch);

  // ボタンの初期位置
  b.x=Math.random()*(innerWidth-100);
  b.y=Math.random()*(innerHeight-100)+80;

  // 移動速度を90%にする
  b.dx=(Math.random()*3.2+1.6)*0.9*(Math.random()<.5?-1:1);
  b.dy=(Math.random()*3.2+1.6)*0.9*(Math.random()<.5?-1:1);

  // 見た目のボタンをクリックした場合
  b.onclick=()=>{
    click(b);
  };

  // 透明な120%タップ判定エリア
  let hit=document.createElement("div");
  hit.className="hit-area";

  // 見た目のボタンとは別にクリック判定を行う
  hit.onclick=(e)=>{
    e.stopPropagation();
    click(b);
  };

  // bodyに直接追加
  document.body.appendChild(b);
  document.body.appendChild(hit);

  // ボタンと判定エリアをセットで管理
  b.hitArea=hit;

  bts.push(b);
}

function startGame(){

  start=Date.now();

  startDiv=document.getElementById("start");
  startDiv.style.display="none";

  document.getElementById("game").style.display="block";

  ["か","じ","あ","か","ね"].forEach(mk);

  requestAnimationFrame(loop);
}

function loop(){

  bts.forEach(b=>{

    if(!b.isConnected)return;

    // 移動
    b.x+=b.dx;
    b.y+=b.dy;

    // 画面端で反射
    if(b.x<0||b.x>innerWidth-90){
      b.dx*=-1;
    }

    if(b.y<70||b.y>innerHeight-60){
      b.dy*=-1;
    }

    // 見た目のボタン位置
    b.style.left=b.x+"px";
    b.style.top=b.y+"px";

    // 透明な120%判定エリアも同じ位置に移動
    if(b.hitArea){
      b.hitArea.style.left=(b.x-(b.offsetWidth*0.1))+"px";
      b.hitArea.style.top=(b.y-(b.offsetHeight*0.1))+"px";
    }

  });

  requestAnimationFrame(loop);
}

function click(b){

  // 正しい順番かチェック
  if(b.dataset.k===seq[idx]){

    // 透明判定エリアを削除
    if(b.hitArea){
      b.hitArea.remove();
    }

    // ボタンを削除
    b.remove();

    idx++;

    progress.textContent=seq.slice(0,idx).join(" ");

    // 全部クリア
    if(idx===seq.length){

      game.style.display="none";
      win.style.display="flex";

      time.textContent=
        "🏆 Clear Time : "+
        ((Date.now()-start)/1000).toFixed(2)+
        " sec";
    }

  }else{

    alert("❌ 順番が違います！");
    location.reload();

  }
}
</script>

</body>
</html>
