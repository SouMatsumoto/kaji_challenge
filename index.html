<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>かじあかねチャレンジ</title>

<style>
body{
  margin:0;
  background:linear-gradient(#ffdff2,#e6f7ff);
  color:#ff4f9a;
  font-family:sans-serif;
  overflow:hidden;
  max-width:430px;
  margin:0 auto;
  height:100vh;
}

#start,#win{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(#ffdff2,#e6f7ff);
}

#game{
  display:none;
}

button{
  font-size:22px;
  padding:11px 14px;
  border-radius:12px;
  border:none;
  position:absolute;
  background:#fff7b8;
  border:3px solid #ff9ecf;
  box-shadow:0 4px 12px rgba(255,158,207,.5);
  z-index:10;
}

#progress{
  position:fixed;
  top:10px;
  left:10px;
  font-size:24px;
  z-index:10;
}

h1{
  font-size:40px;
  text-align:center;
  position:relative;
  z-index:5;
}

h2{
  position:relative;
  z-index:5;
}


/* =========================
   紙吹雪
========================= */

#confettiContainer{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:1;
  display:none;
}

.confetti{
  position:absolute;
  top:-20px;
  width:10px;
  height:16px;
  opacity:.9;
  animation:confettiFall linear infinite;
}

@keyframes confettiFall{

  0%{
    transform:
      translateY(-30px)
      rotate(0deg);
  }

  100%{
    transform:
      translateY(110vh)
      rotate(720deg);
  }

}


/* =========================
   RESTARTボタン
========================= */

#restartButton{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  font-size:20px;
  padding:10px 13px;
  z-index:20;
}


@keyframes pop{

  50%{
    transform:scale(1.08);
  }

}


/* =========================
   スマホ向け調整
========================= */

@media(max-width:600px){

  #start h1{
    font-size:32px;
  }

  #start button{
    font-size:20px;
    padding:10px 13px;
  }

  #restartButton{
    font-size:20px;
    padding:10px 13px;
    bottom:30px;
  }

}
</style>

</head>

<body>

<!-- =========================
     スタート画面
========================= -->

<div id="start">

  <h1>
    かじあかねチャレンジ
  </h1>

<button
style="position:static"
onclick="startGame()"

>

```
🚀 GAME START
```

  </button>

</div>

<!-- =========================
     ゲーム画面
========================= -->

<div id="game">

  <div id="progress"></div>

</div>

<!-- =========================
     リザルト画面
========================= -->

<div id="win" style="display:none;">

  <!-- 紙吹雪 -->

  <div id="confettiContainer"></div>

  <h1 id="resultTitle"></h1>

  <h1 id="resultName"></h1>

  <h1 id="time"></h1>

  <h2 id="resultMessage"></h2>

  <!-- RESTARTボタン -->

<button
id="restartButton"
onclick="restartGame()"

>

```
🔄 RESTART
```

  </button>

</div>

<script>


// =========================
// ゲーム設定
// =========================

// 正解の順番
const seq=[
  "か",
  "じ",
  "あ",
  "か",
  "ね"
];


// ボタンの移動速度
// 元の90%
const SPEED_RATE=0.9;


// =========================
// ゲーム変数
// =========================

let idx=0;

let start;

let bts=[];


// 実際に押した順番
let pressed=[];


// 正解だったかどうか
let isCorrect=true;


// ゲーム中かどうか
let isPlaying=false;


// 紙吹雪の生成タイマー
let confettiInterval=null;


// =========================
// ボタン作成
// =========================

function mk(ch){

  let b=document.createElement("button");


  // ボタンには
  // 「か」「じ」「あ」「か」「ね」
  // だけを表示

  b.dataset.k=ch;

  b.textContent=ch;


  // 初期位置

  b.x=
    Math.random()*
    (innerWidth-100);

  b.y=
    Math.random()*
    (innerHeight-100)
    +80;


  // 移動速度
  // 元の90%に固定

  b.dx=
    (Math.random()*3.2+1.6)
    *SPEED_RATE
    *(Math.random()<.5?-1:1);

  b.dy=
    (Math.random()*3.2+1.6)
    *SPEED_RATE
    *(Math.random()<.5?-1:1);


  // ボタンそのものをタップ判定

  b.onclick=()=>{
    click(b);
  };


  document.body.appendChild(b);

  bts.push(b);

}


// =========================
// ゲーム開始
// =========================

function startGame(){


  // 紙吹雪を停止
  stopConfetti();


  // もし残っているボタンがあれば削除

  bts.forEach(b=>{

    if(b.isConnected){

      b.remove();

    }

  });


  // ゲーム状態を初期化

  idx=0;

  pressed=[];

  bts=[];

  isCorrect=true;

  isPlaying=true;


  // 開始時間

  start=Date.now();


  // スタート画面を非表示

  document
    .getElementById("start")
    .style.display="none";


  // リザルト画面を非表示

  document
    .getElementById("win")
    .style.display="none";


  // ゲーム画面を表示

  document
    .getElementById("game")
    .style.display="block";


  // 進行状況をリセット

  document
    .getElementById("progress")
    .textContent="";


  // 「か」「じ」「あ」「か」「ね」
  // を生成

  seq.forEach(mk);

}


// =========================
// ボタンを動かす
// =========================

function loop(){


  // ゲーム中のみボタンを動かす

  if(isPlaying){


    bts.forEach(b=>{


      if(!b.isConnected){

        return;

      }


      // 移動

      b.x+=b.dx;

      b.y+=b.dy;


      // 左右の端で反射

      if(
        b.x<0||
        b.x>innerWidth-90
      ){

        b.dx*=-1;

      }


      // 上下の端で反射

      if(
        b.y<70||
        b.y>innerHeight-60
      ){

        b.dy*=-1;

      }


      // 位置を更新

      b.style.left=
        b.x+"px";

      b.style.top=
        b.y+"px";


    });

  }


  // ループ継続

  requestAnimationFrame(loop);

}


// =========================
// ボタンを押したとき
// =========================

function click(b){


  // ゲーム中でなければ何もしない

  if(!isPlaying){

    return;

  }


  // 押した文字を記録

  pressed.push(
    b.dataset.k
  );


  // 正しい順番か確認

  if(
    b.dataset.k!==seq[idx]
  ){

    // 一度でも間違えたら不正解

    isCorrect=false;

  }


  // 次の判定位置へ進める

  idx++;


  // 押した順番を表示

  document
    .getElementById("progress")
    .textContent=
      pressed.join(" ");


  // 押したボタンを削除

  b.remove();


  // 5文字すべて押した場合

  if(
    idx===seq.length
  ){

    showResult();

  }

}


// =========================
// リザルト表示
// =========================

function showResult(){


  // ゲームを停止

  isPlaying=false;


  // ゲーム画面を非表示

  document
    .getElementById("game")
    .style.display="none";


  // 残っているボタンを削除

  bts.forEach(b=>{

    if(b.isConnected){

      b.remove();

    }

  });


  // クリアタイム

  const clearTime=
    (
      (Date.now()-start)
      /1000
    ).toFixed(2);


  // 各要素

  const resultTitle=
    document
      .getElementById(
        "resultTitle"
      );

  const resultName=
    document
      .getElementById(
        "resultName"
      );

  const time=
    document
      .getElementById(
        "time"
      );

  const resultMessage=
    document
      .getElementById(
        "resultMessage"
      );


  // =========================
  // 共通
  // =========================


  // ピンク系背景

  document
    .getElementById("win")
    .style.background=
      "linear-gradient(45deg,#ffd1ec,#d8f3ff)";


  // タイトル

  resultTitle.textContent=
    "🎉🎀 HAPPY BIRTHDAY!! 🎀🎉";

  resultTitle.style.fontSize=
    "42px";

  resultTitle.style.color=
    "#ff4f9a";

  resultTitle.style.animation=
    "pop .8s infinite";


  // =========================
  // 成功
  // =========================

  if(isCorrect){


    // 正しい名前

    resultName.textContent=
      "🌸 かじあかね さん 🌸";

    resultName.style.fontSize=
      "40px";

    resultName.style.color=
      "#ff4fa3";


    // クリアタイム

    time.textContent=
      "🏆 Clear Time : "+
      clearTime+
      " sec";

    time.style.fontSize=
      "36px";

    time.style.color=
      "#ff9800";

    time.style.textShadow=
      "0 0 12px #fff";


    // 成功メッセージ

    resultMessage.textContent=
      "💖 AMAZING!! 💖";

    resultMessage.style.fontSize=
      "32px";

    resultMessage.style.color=
      "#ff4f9a";


    // 紙吹雪開始

    startConfetti();

  }


  // =========================
  // 間違い
  // =========================

  else{


    // 押した5文字をつなげる

    resultName.textContent=
      pressed.join("")+
      " さん";

    resultName.style.fontSize=
      "40px";

    resultName.style.color=
      "#ff4fa3";


    // クリアタイムは表示しない

    time.textContent="";

    time.style.fontSize=
      "20px";

    time.style.color=
      "#ff9800";

    time.style.textShadow=
      "none";


    // 面白いメッセージ

    resultMessage.textContent=
      "...おろ??";

    resultMessage.style.fontSize=
      "40px";

    resultMessage.style.color=
      "#ff4f9a";


    // 間違いの場合は
    // 紙吹雪を表示しない

    stopConfetti();

  }


  // リザルト画面を表示

  document
    .getElementById("win")
    .style.display=
      "flex";

}


// =========================
// 紙吹雪を1つ生成
// =========================

function createConfetti(){


  const container=
    document
      .getElementById(
        "confettiContainer"
      );


  const confetti=
    document.createElement(
      "div"
    );


  confetti.className=
    "confetti";


  // ランダムな横位置

  confetti.style.left=
    Math.random()*100+
    "%";


  // ランダムな色

  const colors=[
    "#ff4f9a",
    "#ff9800",
    "#ffd700",
    "#6ed6ff",
    "#a66cff",
    "#ff6b6b",
    "#66d98a"
  ];


  confetti.style.background=
    colors[
      Math.floor(
        Math.random()*
        colors.length
      )
    ];


  // ランダムなサイズ

  const size=
    Math.random()*7+6;


  confetti.style.width=
    size+"px";

  confetti.style.height=
    size*1.5+"px";


  // ランダムな落下時間

  confetti.style.animationDuration=
    (Math.random()*3+3)+
    "s";


  // ランダムな開始遅延

  confetti.style.animationDelay=
    (Math.random()*2)+
    "s";


  container.appendChild(
    confetti
  );


  // 画面下まで落ちたら削除

  setTimeout(()=>{

    confetti.remove();

  },7000);

}


// =========================
// 紙吹雪開始
// =========================

function startConfetti(){


  // 既存の紙吹雪を停止

  stopConfetti();


  const container=
    document
      .getElementById(
        "confettiContainer"
      );


  // 紙吹雪を表示

  container.style.display=
    "block";


  // 最初にある程度生成

  for(
    let i=0;
    i<30;
    i++
  ){

    createConfetti();

  }


  // 0.15秒ごとに追加

  confettiInterval=
    setInterval(()=>{

      createConfetti();

    },150);

}


// =========================
// 紙吹雪停止
// =========================

function stopConfetti(){


  // タイマー停止

  if(
    confettiInterval
  ){

    clearInterval(
      confettiInterval
    );

    confettiInterval=
      null;

  }


  // 紙吹雪を非表示

  const container=
    document
      .getElementById(
        "confettiContainer"
      );


  if(container){

    container.style.display=
      "none";


    // 既存の紙吹雪を全削除

    container.innerHTML="";

  }

}


// =========================
// RESTART
// =========================

function restartGame(){


  // 紙吹雪を停止

  stopConfetti();


  // リザルト画面を非表示

  document
    .getElementById("win")
    .style.display=
      "none";


  // そのまま新しいゲームを開始

  startGame();

}


// =========================
// ゲームループ開始
// =========================
//
// ここで1回だけloopを開始。
// RESTARTしてもloopは追加されないため、
// ボタン速度は変わらない。

requestAnimationFrame(loop);


</script>

</body>
</html>
