<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>かじあかねチャレンジ</title>

<style>
body{
  margin:0;
  background:linear-gradient(#ffdff2,#e6f7ff);
  color:#ff4f9a;
  font-family:sans-serif;
  overflow:hidden;
  max-width:430px;
  margin:0 auto;
  height:100vh;
}

#start,#win{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(#ffdff2,#e6f7ff);
}

#game{
  display:none;
}

button{
  font-size:22px;
  padding:11px 14px;
  border-radius:12px;
  border:none;
  position:absolute;
  background:#fff7b8;
  border:3px solid #ff9ecf;
  box-shadow:0 4px 12px rgba(255,158,207,.5);
}

#progress{
  position:fixed;
  top:10px;
  left:10px;
  font-size:24px;
}

#msg{
  position:fixed;
  top:48px;
  left:10px;
  font-size:16px;
}

h1{
  font-size:40px;
  text-align:center;
}

@keyframes pop{
  50%{
    transform:scale(1.08);
  }
}

/* スマホ向け調整 */
@media(max-width:600px){

  #start h1{
    font-size:32px;
  }

  #start button{
    font-size:20px;
    padding:10px 13px;
  }

}
</style>

</head>

<body>

<!-- スタート画面 -->

<div id="start">
  <h1>かじあかねチャレンジ</h1>

  <button style="position:static" onclick="startGame()">
    🚀 GAME START
  </button>
</div>

<!-- ゲーム画面 -->

<div id="game">

  <div id="progress"></div>

  <div id="msg">
    順番:か→じ→あ→か→ね
  </div>

</div>

<!-- リザルト画面 -->

<div id="win" style="display:none;">

  <h1 id="resultTitle"></h1>

  <h1 id="resultName"></h1>

  <h1 id="time"></h1>

  <h2 id="resultMessage"></h2>

</div>

<script>

// 正解の順番
const seq=["か","じ","あ","か","ね"];

let idx=0;
let start;

let bts=[];

// 実際に押した順番
let pressed=[];

// 正解だったかどうか
let isCorrect=true;


// ボタン作成
function mk(ch){

  let b=document.createElement("button");

  // ボタンには「か」「じ」「あ」「か」「ね」だけを表示
  b.dataset.k=ch;
  b.textContent=ch;

  // 初期位置
  b.x=Math.random()*(innerWidth-100);
  b.y=Math.random()*(innerHeight-100)+80;

  // 移動速度を元の90%にする
  b.dx=
    (Math.random()*3.2+1.6)
    *0.9
    *(Math.random()<.5?-1:1);

  b.dy=
    (Math.random()*3.2+1.6)
    *0.9
    *(Math.random()<.5?-1:1);

  // ボタンそのものをタップ判定
  b.onclick=()=>{
    click(b);
  };

  document.body.appendChild(b);

  bts.push(b);
}


// ゲーム開始
function startGame(){

  start=Date.now();

  idx=0;

  pressed=[];

  bts=[];

  isCorrect=true;

  startDiv=document.getElementById("start");

  startDiv.style.display="none";

  document.getElementById("game").style.display="block";

  // 「か」「じ」「あ」「か」「ね」を生成
  seq.forEach(mk);

  requestAnimationFrame(loop);
}


// ボタンを動かす
function loop(){

  bts.forEach(b=>{

    if(!b.isConnected)return;

    // 移動
    b.x+=b.dx;
    b.y+=b.dy;

    // 左右の端で反射
    if(
      b.x<0||
      b.x>innerWidth-90
    ){
      b.dx*=-1;
    }

    // 上下の端で反射
    if(
      b.y<70||
      b.y>innerHeight-60
    ){
      b.dy*=-1;
    }

    // 位置を更新
    b.style.left=b.x+"px";
    b.style.top=b.y+"px";

  });

  requestAnimationFrame(loop);
}


// ボタンを押したとき
function click(b){

  // 押した文字を記録
  pressed.push(b.dataset.k);

  // 正しい順番か確認
  if(
    b.dataset.k!==seq[idx]
  ){

    // 一度でも間違えたら失敗
    isCorrect=false;

  }

  // 次の判定位置へ進める
  idx++;

  // 押した順番を表示
  progress.textContent=
    pressed.join(" ");

  // 押したボタンを削除
  b.remove();


  // 5文字すべて押した場合
  if(idx===seq.length){

    showResult();

  }

}


// リザルト表示
function showResult(){

  // ゲーム画面を非表示
  game.style.display="none";


  // 残っているボタンを削除
  bts.forEach(b=>{

    if(b.isConnected){

      b.remove();

    }

  });


  // クリアタイム
  const clearTime=
    ((Date.now()-start)/1000).toFixed(2);


  const resultTitle=
    document.getElementById("resultTitle");

  const resultName=
    document.getElementById("resultName");

  const time=
    document.getElementById("time");

  const resultMessage=
    document.getElementById("resultMessage");


  // =========================
  // 成功
  // =========================

  if(isCorrect){

    // 成功時は明るいピンク系
    win.style.background=
      "linear-gradient(45deg,#ffd1ec,#d8f3ff)";


    resultTitle.textContent=
      "🎉🎀 CONGRATULATIONS 🎀🎉";

    resultTitle.style.fontSize="42px";

    resultTitle.style.color="#ff4f9a";

    resultTitle.style.animation=
      "pop .8s infinite";


    resultName.textContent=
      "🌸 かじあかね さん 🌸";

    resultName.style.fontSize="40px";

    resultName.style.color="#ff4fa3";


    time.textContent=
      "🏆 Clear Time : "+
      clearTime+
      " sec";

    time.style.fontSize="36px";

    time.style.color="#ff9800";

    time.style.textShadow=
      "0 0 12px #fff";


    resultMessage.textContent=
      "💖 AMAZING!! 💖";

    resultMessage.style.fontSize="32px";

    resultMessage.style.color="#ff4f9a";

  }


  // =========================
  // 間違い
  // =========================

  else{

    // 間違い時は暗い青系
    win.style.background=
      "linear-gradient(135deg,#07152e,#102a4c,#07152e)";


    resultTitle.textContent=
      "WRONG NAME...";

    resultTitle.style.fontSize="42px";

    resultTitle.style.color="#8fb8e8";

    resultTitle.style.animation=
      "none";


    // 押した5文字をつなげて名前として表示
    // 例：あ→ね→じ→か→か
    //     ↓
    //     あねじかか さん
    resultName.textContent=
      pressed.join("")+
      " さん";

    resultName.style.fontSize="40px";

    resultName.style.color="#ffffff";


    // 正しい名前
    time.textContent=
      "正しい名前は「か→じ→あ→か→ね」";

    time.style.fontSize="20px";

    time.style.color="#8fb8e8";

    time.style.textShadow="none";


    resultMessage.textContent=
      "😢 TRY AGAIN...";

    resultMessage.style.fontSize="32px";

    resultMessage.style.color="#6d91bd";

  }


  // リザルト画面を表示
  win.style.display="flex";

}

</script>

</body>
</html>
