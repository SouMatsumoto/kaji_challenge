<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>かじあかねチャレンジ</title>

<style>
body{
  margin:0;
  background:linear-gradient(#ffdff2,#e6f7ff);
  color:#ff4f9a;
  font-family:sans-serif;
  overflow:hidden;
  max-width:430px;
  margin:0 auto;
  height:100vh;
}

#start,#win{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(#ffdff2,#e6f7ff);
}

#game{
  display:none;
}

button{
  font-size:22px;
  padding:11px 14px;
  border-radius:12px;
  border:none;
  position:absolute;
  background:#fff7b8;
  border:3px solid #ff9ecf;
  box-shadow:0 4px 12px rgba(255,158,207,.5);
}

#progress{
  position:fixed;
  top:10px;
  left:10px;
  font-size:24px;
}

h1{
  font-size:40px;
  text-align:center;
}

/* リザルト画面のRESTARTボタン */
#restartButton{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  font-size:20px;
  padding:10px 13px;
}

@keyframes pop{
  50%{
    transform:scale(1.08);
  }
}

/* スマホ向け調整 */
@media(max-width:600px){

  #start h1{
    font-size:32px;
  }

  #start button{
    font-size:20px;
    padding:10px 13px;
  }

  #restartButton{
    font-size:20px;
    padding:10px 13px;
    bottom:30px;
  }

}
</style>

</head>

<body>

<!-- スタート画面 -->

<div id="start">

  <h1>かじあかねチャレンジ</h1>

  <button style="position:static" onclick="startGame()">
    🚀 GAME START
  </button>

</div>

<!-- ゲーム画面 -->

<div id="game">

  <div id="progress"></div>

</div>

<!-- リザルト画面 -->

<div id="win" style="display:none;">

  <h1 id="resultTitle"></h1>

  <h1 id="resultName"></h1>

  <h1 id="time"></h1>

  <h2 id="resultMessage"></h2>

  <!-- RESTARTボタン -->

  <button id="restartButton" onclick="restartGame()">
    🔄 RESTART
  </button>

</div>

<script>

// 正解の順番
const seq=["か","じ","あ","か","ね"];

let idx=0;
let start;

let bts=[];

// 実際に押した順番
let pressed=[];

// 正解だったかどうか
let isCorrect=true;


// =========================
// ボタン作成
// =========================

function mk(ch){

  let b=document.createElement("button");

  // ボタンには「か」「じ」「あ」「か」「ね」だけを表示
  b.dataset.k=ch;
  b.textContent=ch;

  // 初期位置
  b.x=Math.random()*(innerWidth-100);
  b.y=Math.random()*(innerHeight-100)+80;

  // 移動速度を元の90%にする
  b.dx=
    (Math.random()*3.2+1.6)
    *0.9
    *(Math.random()<.5?-1:1);

  b.dy=
    (Math.random()*3.2+1.6)
    *0.9
    *(Math.random()<.5?-1:1);

  // ボタンそのものをタップ判定
  b.onclick=()=>{
    click(b);
  };

  document.body.appendChild(b);

  bts.push(b);
}


// =========================
// ゲーム開始
// =========================

function startGame(){

  start=Date.now();

  idx=0;

  pressed=[];

  bts=[];

  isCorrect=true;

  // スタート画面を非表示
  document.getElementById("start").style.display="none";

  // リザルト画面を非表示
  document.getElementById("win").style.display="none";

  // ゲーム画面を表示
  document.getElementById("game").style.display="block";

  // 進行状況をリセット
  document.getElementById("progress").textContent="";

  // 「か」「じ」「あ」「か」「ね」を生成
  seq.forEach(mk);

  requestAnimationFrame(loop);
}


// =========================
// ボタンを動かす
// =========================

function loop(){

  bts.forEach(b=>{

    if(!b.isConnected)return;

    // 移動
    b.x+=b.dx;
    b.y+=b.dy;

    // 左右の端で反射
    if(
      b.x<0||
      b.x>innerWidth-90
    ){
      b.dx*=-1;
    }

    // 上下の端で反射
    if(
      b.y<70||
      b.y>innerHeight-60
    ){
      b.dy*=-1;
    }

    // 位置を更新
    b.style.left=b.x+"px";
    b.style.top=b.y+"px";

  });

  requestAnimationFrame(loop);
}


// =========================
// ボタンを押したとき
// =========================

function click(b){

  // 押した文字を記録
  pressed.push(b.dataset.k);

  // 正しい順番か確認
  if(
    b.dataset.k!==seq[idx]
  ){

    // 一度でも間違えたら不正解
    isCorrect=false;

  }

  // 次の判定位置へ進める
  idx++;

  // 押した順番を表示
  progress.textContent=
    pressed.join(" ");

  // 押したボタンを削除
  b.remove();


  // 5文字すべて押した場合
  if(idx===seq.length){

    showResult();

  }

}


// =========================
// リザルト表示
// =========================

function showResult(){

  // ゲーム画面を非表示
  document.getElementById("game").style.display="none";


  // 残っているボタンを削除
  bts.forEach(b=>{

    if(b.isConnected){

      b.remove();

    }

  });


  // クリアタイム
  const clearTime=
    ((Date.now()-start)/1000).toFixed(2);


  const resultTitle=
    document.getElementById("resultTitle");

  const resultName=
    document.getElementById("resultName");

  const time=
    document.getElementById("time");

  const resultMessage=
    document.getElementById("resultMessage");


  // =========================
  // 成功・間違い共通
  // =========================

  // 成功と同じピンク系背景
  document.getElementById("win").style.background=
    "linear-gradient(45deg,#ffd1ec,#d8f3ff)";


  // 成功と同じタイトル
  resultTitle.textContent=
    "🎉🎀 HAPPY BIRTHDAY!! 🎀🎉";

  resultTitle.style.fontSize="42px";

  resultTitle.style.color="#ff4f9a";

  resultTitle.style.animation=
    "pop .8s infinite";


  // =========================
  // 成功
  // =========================

  if(isCorrect){

    // 正しい名前
    resultName.textContent=
      "🌸 かじあかね さん 🌸";

    resultName.style.fontSize="40px";

    resultName.style.color="#ff4fa3";


    // クリアタイム
    time.textContent=
      "🏆 Clear Time : "+
      clearTime+
      " sec";

    time.style.fontSize="36px";

    time.style.color="#ff9800";

    time.style.textShadow=
      "0 0 12px #fff";


    // 成功メッセージ
    resultMessage.textContent=
      "💖 AMAZING!! 💖";

    resultMessage.style.fontSize="32px";

    resultMessage.style.color="#ff4f9a";

  }


  // =========================
  // 間違い
  // =========================

  else{

    // 押した5文字をつなげて名前として表示
    // 例：あ→ね→じ→か→か
    //     ↓
    //     あねじかか さん
    resultName.textContent=
      pressed.join("")+
      " さん";

    resultName.style.fontSize="40px";

    resultName.style.color="#ff4fa3";


    // クリアタイムは表示しない
    time.textContent="";

    time.style.fontSize="20px";

    time.style.color="#ff9800";

    time.style.textShadow="none";


    // 面白い感じのメッセージ
    resultMessage.textContent=
      "...??";

    resultMessage.style.fontSize="40px";

    resultMessage.style.color="#ff4f9a";

  }


  // リザルト画面を表示
  document.getElementById("win").style.display="flex";

}


// =========================
// RESTART
// =========================

function restartGame(){

  // リザルト画面を非表示
  document.getElementById("win").style.display="none";

  // ゲーム画面を表示
  document.getElementById("game").style.display="block";

  // ゲームをそのまま再スタート
  startGame();

}

</script>

</body>
</html>
